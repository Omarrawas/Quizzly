name: quizzly
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  google_fonts: ^8.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.2
  cloud_firestore: ^6.3.0
  csv: ^6.0.0
  file_picker: ^8.1.4
  file_saver: ^0.2.12
  excel: ^4.0.6
  pdf: ^3.12.0
  printing: ^5.14.3
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0



flutter:


  uses-material-design: true

